<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test History Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --surface2:  #1f2333;
      --border:    #2a2f42;
      --border2:   #363c54;
      --text:      #e2e4ec;
      --muted:     #7b82a0;
      --accent:    #5b7cf6;
      --accent2:   #7c9fff;

      --pass:      #2dd4a0;
      --pass-bg:   rgba(45,212,160,.12);
      --fail:      #f25f5c;
      --fail-bg:   rgba(242,95,92,.12);
      --flaky:     #f5a623;
      --flaky-bg:  rgba(245,166,35,.12);
      --skip:           #7b82a0;
      --skip-bg:        rgba(123,130,160,.12);
      --quarantine:     #a78bfa;
      --quarantine-bg:  rgba(167,139,250,.12);
      --regression:     #f97316;
      --regression-bg:  rgba(249,115,22,.12);

      --radius:    8px;
      --radius-lg: 12px;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'DM Sans', sans-serif;
    }

    /* Light Theme Overrides */
[data-theme="light"] {
  --bg: #f8f9fc;
  --surface: #ffffff;
  --surface2: #f1f3f9;
  --border: #dbe0eb;
  --text: #1a1c23;
  --muted: #646c8a;
  --border2: #ccd2e3;
}

    /* System: follow OS when no explicit theme is forced */
@media (prefers-color-scheme: light) {
  :root:not([data-theme="dark"]):not([data-theme="light"]) {
    --bg: #f8f9fc;
    --surface: #ffffff;
    --surface2: #f1f3f9;
    --border: #dbe0eb;
    --text: #1a1c23;
    --muted: #646c8a;
    --border2: #ccd2e3;
  }
}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ─────────────────────────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: 56px 1fr;
      grid-template-columns: 220px 1fr;
      grid-template-areas:
        "topbar topbar"
        "sidebar main";
      min-height: 100vh;
    }

    .topbar {
      grid-area: topbar;
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-weight: 600;
      font-size: 15px;
      letter-spacing: -0.3px;
    }

    .topbar-brand svg { flex-shrink: 0; }

    .topbar-meta {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    /* ── Sidebar ────────────────────────────────────────────── */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 0;
      position: sticky;
      top: 56px;
      height: calc(100vh - 56px);
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: var(--border2);
      padding: 0 18px;
      margin-bottom: 6px;
      margin-top: 20px;
    }

    .sidebar-section-label:first-child { margin-top: 0; }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: color .15s, background .15s, border-color .15s;
      text-decoration: none;
      user-select: none;
    }

    .sidebar-item:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .sidebar-item.active {
      color: var(--text);
      background: rgba(91,124,246,.08);
      border-left-color: var(--accent);
    }

    .sidebar-item svg {
      flex-shrink: 0;
      opacity: .7;
    }

    .sidebar-item.active svg { opacity: 1; }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 12px 18px;
    }

    /* Sidebar search input */
    .sidebar-search {
      margin: 4px 14px 8px;
      position: relative;
    }

    .sidebar-search input {
      width: 100%;
      padding: 7px 10px 7px 30px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 12px;
      transition: border-color .15s;
    }

    .sidebar-search input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .sidebar-search input::placeholder { color: var(--muted); }

    .sidebar-search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 12px;
    }

    /* Sidebar run list (mini) */
    .sidebar-run {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 18px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      cursor: pointer;
      transition: background .15s, color .15s;
      border-left: 3px solid transparent;
    }

    .sidebar-run:hover { background: var(--surface2); color: var(--text); }

    .sidebar-run.active {
      background: rgba(91,124,246,.08);
      border-left-color: var(--accent);
      color: var(--text);
    }

    .sidebar-run-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-run-info { flex: 1; min-width: 0; }
    .sidebar-run-date { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sidebar-run-stat { font-size: 10px; color: var(--muted); margin-top: 1px; }

    .main {
      grid-area: main;
      padding: 24px 28px 48px;
      min-width: 0;
    }

    /* ── Section titles ─────────────────────────────────────── */
    .section { margin-bottom: 28px; }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 13px;
      font-family: var(--mono);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    /* ── States ─────────────────────────────────────────────── */
    .state-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      color: var(--muted);
      text-align: center;
      gap: 12px;
    }

    .state-screen-icon {
      font-size: 36px;
      line-height: 1;
    }

    .state-screen h3 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
    }

    .state-screen p {
      font-size: 13px;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 1024px) {
      .shell { grid-template-columns: 180px 1fr; }
    }

    @media (max-width: 768px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-areas: "topbar" "main";
      }
      .sidebar { display: none; }
      .latest-stats-row { grid-template-columns: repeat(4, 1fr); }
      .main { padding: 16px 14px 48px; }
    }

    @media (max-width: 560px) {
      .latest-stats-row { grid-template-columns: repeat(2, 1fr); }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 700px) {
      .detail-panels { grid-template-columns: 1fr; }
    }

    /* ── Latest run stat cards ──────────────────────────────── */
    .latest-run-section {
      margin-bottom: 28px;
    }

    .latest-run-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .latest-run-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .latest-run-ts {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .latest-stats-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .latest-stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      border-top: 3px solid transparent;
    }

    .latest-stat.pass-card        { border-top-color: var(--pass);        }
    .latest-stat.fail-card        { border-top-color: var(--fail);        }
    .latest-stat.flaky-card       { border-top-color: var(--flaky);       }
    .latest-stat.quarantine-card  { border-top-color: var(--quarantine);  }
    .latest-stat.regression-card  { border-top-color: var(--regression);  }
    .latest-stat.skip-card        { border-top-color: var(--skip);        }
    .latest-stat.dur-card         { border-top-color: var(--accent);      }
    .latest-stat.rate-card  { border-top-color: var(--accent2); }
    .latest-stat.total-card { border-top-color: var(--border2); }

    .latest-stat-label {
      font-size: 10px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .latest-stat-value {
      font-size: 26px;
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }

    .latest-stat.clickable {
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }

    .latest-stat.clickable:hover {
      background: var(--surface2);
      transform: translateY(-1px);
    }

    .latest-stat.clickable.active-filter {
      background: var(--surface2);
      box-shadow: 0 0 0 1px var(--border2);
    }

    .latest-stat.pass-card.active-filter        { box-shadow: 0 0 0 1px var(--pass);        }
    .latest-stat.fail-card.active-filter        { box-shadow: 0 0 0 1px var(--fail);        }
    .latest-stat.flaky-card.active-filter       { box-shadow: 0 0 0 1px var(--flaky);       }
    .latest-stat.quarantine-card.active-filter  { box-shadow: 0 0 0 1px var(--quarantine);  }
    .latest-stat.regression-card.active-filter  { box-shadow: 0 0 0 1px var(--regression);  }
    .latest-stat.skip-card.active-filter        { box-shadow: 0 0 0 1px var(--skip);        }

    /* Show all filter banner */
    .filter-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      margin-bottom: 10px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
    }

    .filter-banner-label { color: var(--muted); }
    .filter-banner-label strong { color: var(--text); }

    .filter-banner-clear {
      background: none;
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      padding: 3px 10px;
      cursor: pointer;
      transition: color .15s, border-color .15s;
    }

    .filter-banner-clear:hover { color: var(--text); border-color: var(--text); }

    /* ── Stats row ──────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-card-label {
      font-size: 11px;
      font-family: var(--mono);
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
    }

    .stat-card-value {
      font-size: 32px;
      font-weight: 600;
      font-family: var(--mono);
      line-height: 1;
    }

    .stat-card-sub {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Tab toggle ─────────────────────────────────────────── */
    .tab-group {
      display: flex;
      gap: 2px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 3px;
    }

    .tab-btn {
      padding: 6px 16px;
      border: none;
      background: transparent;
      border-radius: 6px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      transition: all .15s;
    }

    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Individual test trend ──────────────────────────────── */
    .test-view { display: none; }
    .test-view.active { display: block; }

    .search-box {
      width: 100%;
      padding: 10px 14px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      margin-bottom: 14px;
      transition: border-color .15s;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--accent);
    }

    .search-box::placeholder { color: var(--muted); }

    .test-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
      max-height: 420px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .test-grid::-webkit-scrollbar { width: 4px; }
    .test-grid::-webkit-scrollbar-track { background: transparent; }
    .test-grid::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .test-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }

    .test-card:hover { border-color: var(--border2); background: var(--surface); }
    .test-card.selected { border-color: var(--accent); background: rgba(91,124,246,.07); }

    .test-card-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .test-card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .test-card-project {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 4px;
    }

    /* Sparkline */
    .sparkline {
      display: flex;
      gap: 2px;
      align-items: center;
    }

    .spark-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .spark-dot.pass  { background: var(--pass); }
    .spark-dot.fail  { background: var(--fail); }
    .spark-dot.flaky       { background: var(--flaky);       }
    .spark-dot.quarantine  { background: var(--quarantine);  }
    .spark-dot.skip  { background: var(--skip); opacity: .5; }
    .spark-dot.none  { background: var(--border2); }

    .test-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      font-size: 10px;
      font-family: var(--mono);
      padding: 1px 6px;
      border-radius: 4px;
      background: rgba(91,124,246,.15);
      color: var(--accent2);
      border: 1px solid rgba(91,124,246,.25);
    }

    /* Test trend detail */
    .test-detail {
      margin-top: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
    }

    .test-detail-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .test-detail-name {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.4;
    }

    .test-detail-stats {
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    .test-detail-stat {
      text-align: right;
    }

    .test-detail-stat-value {
      font-family: var(--mono);
      font-size: 20px;
      font-weight: 600;
      line-height: 1;
    }

    .test-detail-stat-label {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .trend-row {
      border-radius: var(--radius);
      margin-bottom: 4px;
      border-left: 3px solid transparent;
      background: var(--surface2);
      transition: background .15s;
      overflow: hidden;
    }

    .trend-row:hover { background: var(--surface); }
    .trend-row.pass  { border-left-color: var(--pass); }
    .trend-row.fail  { border-left-color: var(--fail); }
    .trend-row.flaky       { border-left-color: var(--flaky);       }
    .trend-row.quarantine  { border-left-color: var(--quarantine);  }
    .trend-row.skip  { border-left-color: var(--skip); }

    .trend-row-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      cursor: default;
    }

    .trend-row.has-detail .trend-row-summary { cursor: pointer; }

    .trend-row-left { flex: 1; min-width: 0; }

    .trend-row-date {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .trend-row-runid {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--border2);
      margin-top: 1px;
    }

    .trend-row-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .trend-row-status {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      min-width: 46px;
      text-align: right;
    }

    .trend-row-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      min-width: 48px;
      text-align: right;
    }

    .trend-row-chevron {
      font-size: 10px;
      color: var(--muted);
      transition: transform .2s;
      width: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .trend-row-chevron.open { transform: rotate(180deg); }

    /* Expandable failure body */
    .trend-row-body {
      display: none;
      padding: 0 12px 12px;
      border-top: 1px solid var(--border);
    }

    .trend-row-body.open { display: block; }

    /* Annotation label (from test.info().annotations title) */
    .annot-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      color: var(--flaky);
      margin-bottom: 4px;
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .annot-desc {
      font-size: 12px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    /* Collapsible raw Playwright error */
    .error-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      margin-top: 6px;
      padding: 4px 0;
    }

    .error-toggle:hover { color: var(--text); }

    .error-toggle-icon {
      font-size: 9px;
      transition: transform .15s;
    }

    .error-toggle-icon.open { transform: rotate(90deg); }

    .trend-row-error {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fail);
      margin-top: 4px;
      padding: 8px 10px;
      background: var(--fail-bg);
      border-radius: 4px;
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .trend-row-error.open { display: block; }

    /* Test detail annotation header block */
    .test-annot-block {
      margin-bottom: 16px;
      padding: 14px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .test-annot-type {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .test-annot-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
    }

    /* ── Runs list ──────────────────────────────────────────── */
    .run-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color .15s;
    }

    .run-card:hover { border-color: var(--border2); }

    .run-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      gap: 16px;
    }

    .run-card-left {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .run-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .run-card-ts {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
    }

    .run-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }

    .badge.pass        { background: var(--pass-bg);        color: var(--pass);        }
    .badge.fail        { background: var(--fail-bg);        color: var(--fail);        }
    .badge.flaky       { background: var(--flaky-bg);       color: var(--flaky);       }
    .badge.skip        { background: var(--skip-bg);        color: var(--skip);        }
    .badge.quarantine  { background: var(--quarantine-bg);  color: var(--quarantine);  }
    .badge.regression  { background: var(--regression-bg);  color: var(--regression);  }

    .run-card-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .run-dur {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .run-chevron {
      color: var(--muted);
      font-size: 11px;
      transition: transform .2s;
    }

    .run-chevron.open { transform: rotate(180deg); }

    /* Run detail */
    .run-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 18px;
    }

    .run-detail.open { display: block; }

    .run-detail-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .show-all-btn {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent2);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .show-all-btn:hover { color: var(--accent); }

    .detail-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
    }

    .test-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 10px;
      border-radius: var(--radius);
      border-left: 3px solid transparent;
      background: var(--surface2);
      margin-bottom: 4px;
    }

    .test-row.pass  { border-left-color: var(--pass); }
    .test-row.fail  { border-left-color: var(--fail); }
    .test-row.flaky       { border-left-color: var(--flaky);       }
    .test-row.quarantine  { border-left-color: var(--quarantine);  }
    .test-row.skip  { border-left-color: var(--skip); opacity: .7; }

    .test-row-body { flex: 1; min-width: 0; }

    .test-row-title {
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .test-row-meta {
      display: flex;
      gap: 12px;
      margin-top: 3px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .test-row-error {
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--fail-bg);
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fail);
      white-space: pre-wrap;
      word-break: break-word;
      display: none;
    }

    .test-row-error.open { display: block; }

    .test-row-error-toggle {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      background: none;
      border: none;
      padding: 0;
    }

    .test-row-error-toggle:hover { color: var(--fail); }

    .test-row-error-icon {
      font-size: 9px;
      transition: transform .15s;
      display: inline-block;
    }

    .test-row-error-icon.open { transform: rotate(90deg); }

    .artifact-links {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }

    .artifact-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      background: rgba(91,124,246,.12);
      border: 1px solid rgba(91,124,246,.25);
      color: var(--accent2);
      text-decoration: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 11px;
      transition: background .15s;
    }

    .artifact-link:hover { background: rgba(91,124,246,.22); }

    button.artifact-link {
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: normal;
    }

    /* ── Test detail sub-panels ─────────────────────────────── */
    .detail-panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .detail-sub-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .detail-sub-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* Duration mini chart */
    .dur-mini {
      height: 72px;
      position: relative;
    }

    .dur-mini svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .dur-mini-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .dur-delta {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 6px;
      border-radius: 4px;
    }

    .dur-delta.up   { color: var(--fail);  background: var(--fail-bg); }
    .dur-delta.down { color: var(--pass);  background: var(--pass-bg); }
    .dur-delta.flat { color: var(--muted); background: var(--surface); border: 1px solid var(--border); }

    /* Failure reason bars */
    .reason-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .reason-row {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .reason-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .reason-label {
      font-size: 11px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 78%;
      font-family: var(--mono);
    }

    .reason-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .reason-bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .reason-bar-fill {
      height: 100%;
      background: var(--fail);
      border-radius: 2px;
      transition: width .4s ease;
    }

    .reason-bar-fill.flaky { background: var(--flaky); }

    .no-failures-msg {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      padding: 8px 0;
      text-align: center;
    }

    /* ── Health grade ───────────────────────────────────────── */
    .health-grade {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .grade-A { background: var(--pass-bg);  color: var(--pass);  }
    .grade-B { background: rgba(91,124,246,.15); color: var(--accent2); }
    .grade-C { background: var(--flaky-bg); color: var(--flaky); }
    .grade-D { background: rgba(242,95,92,.2); color: var(--fail); }
    .grade-F { background: var(--fail-bg);  color: var(--fail);  }

    /* ── Slow badge ─────────────────────────────────────────── */
    .slow-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: var(--flaky-bg);
      color: var(--flaky);
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* ── Regressing badge ───────────────────────────────────── */
    .regressing-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: var(--regression-bg);
      color: var(--regression);
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* ── Failure-point badges ────────────────────────────────── */
    .same-point-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: rgba(245,166,35,.15);
      color: var(--flaky);
      flex-shrink: 0;
    }
    .diff-point-badge {
      display: inline-flex;
      align-items: center;
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      background: rgba(34,211,238,.12);
      color: #22d3ee;
      flex-shrink: 0;
    }

    /* ── Page views (dashboard / trends / gallery) ──────────── */
    .page-view { display: none; }
    .page-view.active { display: block; }

    /* ── Sidebar filter chips ───────────────────────────────── */
    .sidebar-filter-section {
      padding: 0 12px;
      margin-bottom: 6px;
    }

    .sidebar-filter-group-title {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--border2);
      margin: 12px 6px 6px;
    }

    .sidebar-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .sidebar-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
    }

    .sidebar-chip:hover { border-color: var(--border2); color: var(--text); }
    .sidebar-chip.active { background: rgba(91,124,246,.12); border-color: var(--accent); color: var(--accent2); }

    .sidebar-chip-count {
      background: var(--border);
      border-radius: 3px;
      padding: 0 4px;
      font-size: 9px;
    }

    .sidebar-chip.active .sidebar-chip-count { background: rgba(91,124,246,.25); }

    /* ── Gallery page ───────────────────────────────────────── */
    .gallery-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 13px;
    }

    .gallery-run-group {
      margin-bottom: 28px;
    }

    .gallery-run-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .gallery-run-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .gallery-run-ts {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .gallery-run-count {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 10px;
    }

    .gallery-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
    }

    .gallery-item:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .gallery-img-wrap {
      width: 100%;
      aspect-ratio: 16/9;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .gallery-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .gallery-img-placeholder {
      font-size: 28px;
      opacity: .3;
    }

    .gallery-item-info {
      padding: 8px 10px;
    }

    .gallery-item-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-item-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Lightbox ────────────────────────────────────────────── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .lightbox.open { display: flex; }

    .lightbox img {
      max-width: 88vw;
      max-height: 78vh;
      border-radius: var(--radius);
      object-fit: contain;
      display: block;
    }

    .lightbox-title {
      font-family: var(--mono);
      font-size: 12px;
      color: rgba(255,255,255,.65);
      text-align: center;
      max-width: 80vw;
    }

    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(255,255,255,.8);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .15s;
      line-height: 1;
    }

    .lightbox-close:hover { background: rgba(255,255,255,.2); color: #fff; }

    /* ── Export button ───────────────────────────────────────── */
    .export-btn {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: var(--surface2);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all .15s;
    }

    .export-btn:hover { color: var(--text); border-color: var(--accent); background: rgba(91,124,246,.08); }

    /* ── CSV split-button dropdown ───────────────────────────── */
    .csv-btn-wrap {
      display: none;
      position: relative;
    }

    .csv-btn-wrap .export-btn {
      display: inline-flex;
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
    }

    .csv-chevron {
      display: inline-flex;
      align-items: center;
      padding: 7px 8px;
      border-radius: 0 var(--radius) var(--radius) 0;
      border: 1px solid var(--border2);
      border-left: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }

    .csv-chevron:hover { color: var(--text); border-color: var(--accent); background: rgba(91,124,246,.08); }

    .csv-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 140px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 50;
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }

    .csv-dropdown.open { display: block; }

    .csv-dropdown-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      transition: background .12s, color .12s;
    }

    .csv-dropdown-item:hover { background: var(--surface); color: var(--text); }

    /* ── PDF split button (mirrors CSV) ─────────────────────────────── */
    .pdf-btn-wrap { position: relative; display: none; }
    .pdf-btn-wrap .export-btn {
      display: inline-flex;
      border-right: none;
      border-radius: var(--radius) 0 0 var(--radius);
    }
    .pdf-chevron {
      display: inline-flex;
      align-items: center;
      padding: 7px 8px;
      border-radius: 0 var(--radius) var(--radius) 0;
      border: 1px solid var(--border2);
      border-left: 1px solid var(--border);
      background: var(--surface2);
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .pdf-chevron:hover { color: var(--text); border-color: var(--accent); background: rgba(91,124,246,.08); }
    .pdf-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      min-width: 170px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      z-index: 200;
      overflow: hidden;
    }
    .pdf-dropdown.open { display: block; }

    .theme-toggle {
  display: inline-flex;
  gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px;
}

.theme-btn {
  padding: 6px 14px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;

  font-family: var(--mono);
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);

  transition: all .15s;
}

.theme-btn:hover {
  color: var(--text);
}

.theme-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.4);
}

.lang-toggle {
  display: inline-flex;
  gap: 2px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 3px;
}

.lang-btn {
  padding: 6px 10px;
  border: none;
  background: transparent;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  transition: all .15s;
  letter-spacing: .04em;
}

.lang-btn:hover { color: var(--text); }

.lang-btn.active {
  background: var(--surface);
  color: var(--text);
  box-shadow: 0 1px 3px rgba(0,0,0,.4);
}

/* ── Export run picker modal ─────────────────────────────────────── */
.export-run-picker {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 1000;
  align-items: center;
  justify-content: center;
}
.export-run-picker.open { display: flex; }
.erp-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,.2);
  min-width: 360px;
  max-width: 520px;
  max-height: 60vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.erp-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.erp-title {
  font-family: var(--font-mono);
  font-size: .85rem;
  font-weight: 600;
  color: var(--text);
}
.erp-close {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-muted);
  font-size: 1rem;
  padding: 2px 6px;
  border-radius: 4px;
}
.erp-close:hover { background: var(--hover); }
.erp-list { flex: 1; overflow-y: auto; }
.erp-run-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  font-size: .82rem;
}
.erp-run-row:hover { background: var(--hover); }
.erp-run-row:last-child { border-bottom: none; }
.erp-run-date {
  font-family: var(--font-mono);
  font-size: .78rem;
  color: var(--text-muted);
  white-space: nowrap;
}
.erp-run-badges { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
.erp-run-dur {
  font-family: var(--font-mono);
  font-size: .78rem;
  color: var(--text-muted);
  white-space: nowrap;
}

    /* ── Chart panels ───────────────────────────────────────── */
    .chart-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px 22px;
    }

    /* Stacked bar chart */
    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding-bottom: 28px; /* room for labels */
      position: relative;
      overflow-x: auto;
    }

    .bar-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 28px;
      gap: 0;
      height: 100%;
      justify-content: flex-end;
      position: relative;
      cursor: pointer;
    }

    .bar-stack {
      width: 100%;
      display: flex;
      flex-direction: column-reverse; /* pass on bottom, fail on top */
      border-radius: 3px 3px 0 0;
      overflow: hidden;
      transition: opacity .15s;
    }

    .bar-col:hover .bar-stack { opacity: .8; }

    .bar-seg-pass {
      background: var(--pass);
      transition: height .3s ease;
    }

    .bar-seg-fail {
      background: var(--fail);
      transition: height .3s ease;
    }

    .bar-seg-skip {
      background: var(--skip);
      opacity: .5;
      transition: height .3s ease;
    }

    .bar-lbl {
      position: absolute;
      bottom: 0;
      font-size: 10px;
      font-family: var(--mono);
      color: var(--muted);
      white-space: nowrap;
      text-align: center;
    }

    /* Tooltip */
    .bar-tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 6px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 11px;
      font-family: var(--mono);
      white-space: nowrap;
      z-index: 20;
      pointer-events: none;
      line-height: 1.7;
    }

    .bar-col:hover .bar-tooltip { display: block; }

    /* Duration line chart */
    .dur-chart {
      height: 80px;
      position: relative;
      overflow: hidden;
    }

    .dur-chart svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* ── Chart legend ───────────────────────────────────────── */
    .chart-legend {
      display: flex;
      gap: 16px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* ── Two-column layout for charts ───────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 12px;
      margin-bottom: 28px;
    }

    .dur-panel .section-title { margin-bottom: 12px; display: block; }

    /* ── Trends page ────────────────────────────────────────── */
    .trends-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }

    @media (max-width: 700px) { .trends-grid { grid-template-columns: 1fr; } }

    .trend-mini-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 18px;
    }

    .trend-mini-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .trend-mini-current {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 10px;
    }

    .trend-mini-svg {
      height: 60px;
      width: 100%;
    }

    .trend-mini-svg svg { width: 100%; height: 100%; overflow: visible; }

    .trend-mini-footer {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
    }

    /* ── Guided tour ─────────────────────────────────────────── */
    .tour-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: none;
      pointer-events: none;
    }
    .tour-overlay.active { display: block; }

    .tour-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(8, 10, 18, 0.72);
      z-index: 9001;
      pointer-events: all;
    }

    .tour-spotlight {
      position: fixed;
      z-index: 9002;
      border-radius: 10px;
      box-shadow: 0 0 0 9999px rgba(8,10,18,.72);
      pointer-events: none;
      outline: 1.5px solid rgba(91,124,246,.55);
      transition:
        top    .32s cubic-bezier(.4,0,.2,1),
        left   .32s cubic-bezier(.4,0,.2,1),
        width  .32s cubic-bezier(.4,0,.2,1),
        height .32s cubic-bezier(.4,0,.2,1);
    }

    .tour-card {
      position: fixed;
      z-index: 9003;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 12px;
      padding: 20px 20px 16px;
      width: 300px;
      box-shadow: 0 20px 48px rgba(0,0,0,.45);
      transition:
        top  .32s cubic-bezier(.4,0,.2,1),
        left .32s cubic-bezier(.4,0,.2,1);
      pointer-events: all;
    }

    .tour-card-step {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent2);
      margin-bottom: 8px;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .tour-card-title {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .tour-card-body {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.65;
      margin-bottom: 16px;
    }

    .tour-card-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tour-skip {
      margin-right: auto;
      font-size: 11px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      font-family: var(--sans);
    }
    .tour-skip:hover { color: var(--text); }

    .tour-btn {
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
      border: none;
      line-height: 1.4;
    }
    .tour-btn.primary { background: var(--accent); color: #fff; }
    .tour-btn.primary:hover { opacity: .88; }
    .tour-btn.ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .tour-btn.ghost:hover { color: var(--text); }

    /* Help button in topbar */
    .tour-help-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--border2);
      background: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      flex-shrink: 0;
    }
    .tour-help-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Print / PDF ─────────────────────────────────────────── */
    #printReport { display: none; }

    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff !important; color: #1a1a1a !important; font-family: Georgia, serif; }
      .shell { display: block !important; }
      .topbar, .sidebar, .footer, .export-btn,
      .tab-group, .filter-banner, .lightbox,
      #testDetail, #testView, .run-detail { display: none !important; }
      .main { padding: 0 !important; }
      #mainContent { display: none !important; }
      #printReport { display: block !important; }

      .pr-page { max-width: 780px; margin: 0 auto; padding: 32px 40px; }
      .pr-header { background: #0f1117 !important; color: #fff !important; padding: 24px 28px; border-radius: 8px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
      .pr-brand { font-family: monospace; font-size: 10px; color: #5b7cf6; text-transform: uppercase; letter-spacing: .08em; }
      .pr-project { font-size: 20px; font-weight: 700; color: #fff; font-family: sans-serif; margin: 5px 0 3px; }
      .pr-run-meta { font-size: 11px; color: #7b82a0; font-family: monospace; }
      .pr-grade { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-family: monospace; font-size: 18px; font-weight: 700; }
      .pr-grade-A { background: rgba(45,212,160,.2); color: #2dd4a0; }
      .pr-grade-B { background: rgba(91,124,246,.2); color: #7c9fff; }
      .pr-grade-C { background: rgba(245,166,35,.2); color: #f5a623; }
      .pr-grade-D, .pr-grade-F { background: rgba(242,95,92,.2); color: #f25f5c; }
      .pr-section-title { font-family: sans-serif; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #999; border-bottom: 1px solid #eee; padding-bottom: 5px; margin: 20px 0 10px; }
      .pr-kpi-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; }
      .pr-kpi { background: #f8f9fa !important; border-radius: 6px; padding: 10px 12px; }
      .pr-kpi-label { font-size: 9px; font-family: sans-serif; text-transform: uppercase; letter-spacing: .08em; color: #999; margin-bottom: 4px; }
      .pr-kpi-value { font-size: 22px; font-weight: 700; font-family: monospace; line-height: 1; }
      .pr-trend-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
      .pr-trend-label { font-size: 10px; font-family: monospace; color: #666; width: 56px; }
      .pr-trend-bg { flex: 1; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
      .pr-trend-fill { height: 100%; border-radius: 3px; }
      .pr-trend-val { font-size: 10px; font-family: monospace; color: #999; width: 34px; text-align: right; }
      .pr-failure-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; border-bottom: 0.5px solid #f0f0f0; }
      .pr-failure-row:last-child { border-bottom: none; }
      .pr-failure-count { font-family: monospace; font-size: 12px; font-weight: 700; color: #c0392b; min-width: 26px; text-align: right; }
      .pr-failure-bar-wrap { width: 70px; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
      .pr-failure-bar { height: 100%; background: #e74c3c; border-radius: 2px; }
      .pr-failure-msg { font-family: monospace; font-size: 10px; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      .pr-suite-title { font-family: sans-serif; font-size: 11px; font-weight: 600; color: #444; background: #f4f4f4 !important; padding: 5px 10px; border-radius: 4px; margin: 10px 0 4px; page-break-after: avoid; }
      .pr-test-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 10px; border-bottom: 0.5px solid #f5f5f5; font-family: sans-serif; font-size: 11px; page-break-inside: avoid; }
      .pr-test-row:last-child { border-bottom: none; }
      .pr-test-name { flex: 1; color: #333; }
      .pr-test-dur { font-family: monospace; font-size: 10px; color: #aaa; margin: 0 10px; }
      .pr-status { font-size: 9px; font-family: monospace; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
      .pr-s-pass  { background: #eaf8f2 !important; color: #0f6e56; }
      .pr-s-fail  { background: #fef0f0 !important; color: #a32d2d; }
      .pr-s-flaky { background: #fef9ec !important; color: #854f0b; }
      .pr-s-skip  { background: #f5f5f5 !important; color: #888; }
      .pr-footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 9px; font-family: monospace; color: #ccc; }
      @page { margin: 12mm 10mm; size: A4; }
    }

  </style>
</head>
<body>
<div class="shell">

  <!-- Top bar -->
  <header class="topbar">
    <div class="topbar-brand">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect x="1" y="1" width="20" height="20" rx="5" stroke="#5b7cf6" stroke-width="1.5"/>
        <path d="M6 11l3.5 3.5L16 7" stroke="#5b7cf6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="brandName">pw_dashboard</span>
    </div>
    <div class="topbar-meta" id="topbarMeta">loading…</div>
    <div class="csv-btn-wrap" id="exportCsvWrap">
      <button class="export-btn" id="exportCsvBtn" onclick="exportCSV('latest')">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5L6.5 8.5l3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 9.5v1a1 1 0 001 1h9a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span data-i18n="export_csv">Export CSV</span>
      </button>
      <button class="csv-chevron" id="csvChevron" onclick="toggleCsvDropdown(event)">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="csv-dropdown" id="csvDropdown">
        <div class="csv-dropdown-item" onclick="exportCSV('latest');closeCsvDropdown()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.5" fill="currentColor"/></svg>
          <span data-i18n="csv_latest">Latest run</span>
        </div>
        <div class="csv-dropdown-item" onclick="exportCSV('all');closeCsvDropdown()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 3h10M1 6h10M1 9h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          <span data-i18n="csv_all">All runs</span>
        </div>
        <div class="csv-dropdown-item" onclick="openExportRunPicker('csv');closeCsvDropdown()" data-i18n="export_select_run">Select run…</div>
      </div>
    </div>
    <div class="pdf-btn-wrap" id="exportPdfWrap">
      <button class="export-btn" onclick="exportPDF()">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v7M3.5 5.5L6.5 8.5l3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M1 9.5v1a1 1 0 001 1h9a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <span data-i18n="export_pdf">Export PDF</span>
      </button>
      <button class="pdf-chevron" onclick="togglePdfDropdown(event)" aria-label="PDF export options">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="pdf-dropdown" id="pdfDropdown">
        <div class="csv-dropdown-item" onclick="exportPDF(0);closePdfDropdown()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.2"/><circle cx="6" cy="6" r="1.5" fill="currentColor"/></svg>
          <span data-i18n="csv_latest">Latest run</span>
        </div>
        <div class="csv-dropdown-item" onclick="openExportRunPicker('pdf');closePdfDropdown()">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M1 3h10M1 6h7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/><circle cx="9.5" cy="9.5" r="2" stroke="currentColor" stroke-width="1.1"/><path d="M9.5 8.5v1l.7.7" stroke="currentColor" stroke-width="1.1" stroke-linecap="round"/></svg>
          <span data-i18n="export_select_run">Select run…</span>
        </div>
      </div>
    </div>
    <button class="tour-help-btn" onclick="startTour()" data-i18n-title="tour_help_title" title="Start guided tour">?</button>
    <div class="lang-toggle" id="lang-toggle">
  <button data-lang="en" class="lang-btn active">EN</button>
  <button data-lang="it" class="lang-btn">IT</button>
</div>
    <div class="theme-toggle" id="theme-toggle">
  <button data-theme="system" data-i18n="theme_system" class="theme-btn active">System</button>
  <button data-theme="dark" data-i18n="theme_dark" class="theme-btn">Dark</button>
  <button data-theme="light" data-i18n="theme_light" class="theme-btn">Light</button>
</div>
  </header>


  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <span class="sidebar-section-label" data-i18n="nav_navigate">Navigate</span>
    <div class="sidebar-item active" id="nav-dashboard" onclick="navTo('dashboard',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".7"/><rect x="8.5" y="1" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".7"/><rect x="1" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".7"/><rect x="8.5" y="8.5" width="5.5" height="5.5" rx="1.5" fill="currentColor" opacity=".4"/></svg>
      <span data-i18n="nav_dashboard">Dashboard</span>
    </div>
    <div class="sidebar-item" id="nav-trends" onclick="navTo('trends',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><polyline points="1,12 4,7 7,9 10,4 14,6" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span data-i18n="nav_trends">Trends</span>
    </div>
    <div class="sidebar-item" id="nav-search" onclick="navTo('search',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.4"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      <span data-i18n="nav_search">Search tests</span>
    </div>
    <div class="sidebar-item" id="nav-gallery" onclick="navTo('gallery',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><rect x="1" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="1" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="1" y="8" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/><rect x="8" y="8" width="6" height="6" rx="1.5" stroke="currentColor" stroke-width="1.3"/></svg>
      <span data-i18n="nav_gallery">Gallery</span>
    </div>
    <div class="sidebar-item" id="nav-quarantine" onclick="navTo('quarantine',this)">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M7.5 1.5L2 4v4c0 3.3 2.4 5.7 5.5 6.5C10.6 13.7 13 11.3 13 8V4L7.5 1.5z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round" fill="none"/></svg>
      <span data-i18n="nav_quarantine">Quarantine</span>
    </div>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label" data-i18n="nav_filters">Filters</span>
    <div class="sidebar-filter-section" id="sidebarFilters">
      <div style="font-family:var(--mono);font-size:11px;color:var(--border2);padding:4px 6px" data-i18n="nav_loading">loading…</div>
    </div>

    <div class="sidebar-divider"></div>
    <span class="sidebar-section-label" data-i18n="nav_recent_runs">Recent runs</span>
    <div id="sidebarRuns">
      <div style="padding:8px 18px;font-family:var(--mono);font-size:11px;color:var(--border2)" data-i18n="nav_loading">loading…</div>
    </div>
  </nav>

  <!-- Guided tour overlay -->
  <div class="tour-overlay" id="tourOverlay">
    <div class="tour-backdrop" onclick="endTour()"></div>
    <div class="tour-spotlight" id="tourSpotlight"></div>
    <div class="tour-card" id="tourCard">
      <div class="tour-card-step" id="tourStepLabel"></div>
      <div class="tour-card-title" id="tourTitle"></div>
      <div class="tour-card-body"  id="tourBody"></div>
      <div class="tour-card-actions">
        <button class="tour-skip" id="tourSkip" onclick="endTour()" data-i18n="tour_skip">Skip tour</button>
        <button class="tour-btn ghost"   id="tourPrev" onclick="prevTourStep()" data-i18n="tour_back">← Back</button>
        <button class="tour-btn primary" id="tourNext" onclick="nextTourStep()">Next →</button>
      </div>
    </div>
  </div>

  <!-- Hidden print report (populated by exportPDF(), visible only during print) -->
  <div id="printReport"></div>

  <div class="export-run-picker" id="exportRunPicker" onclick="closeExportRunPicker()">
    <div class="erp-panel" onclick="event.stopPropagation()">
      <div class="erp-header">
        <span class="erp-title" id="erpTitle">Select run</span>
        <button class="erp-close" onclick="closeExportRunPicker()">✕</button>
      </div>
      <div class="erp-list" id="erpList"></div>
    </div>
  </div>

  <!-- Lightbox — click overlay to close, click img/title to stay open -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <button class="lightbox-close" onclick="event.stopPropagation();closeLightbox()">✕</button>
    <img id="lightboxImg" src="" alt="" onclick="event.stopPropagation()">
    <div class="lightbox-title" id="lightboxTitle" onclick="event.stopPropagation()"></div>
  </div>

// ── Locale helpers ─────────────────────────────────────────────────────────
let currentLocale = 'en';

function detectLocale() {
  const stored = localStorage.getItem('pw-reporter-locale');
  if (stored === 'en' || stored === 'it') return stored;
  const lang = (navigator.language || '').toLowerCase().split('-')[0];
  return lang === 'it' ? 'it' : 'en';
}

function t(key, vars = {}) {
  const str = (TRANSLATIONS[currentLocale] ?? TRANSLATIONS.en)[key]
    ?? TRANSLATIONS.en[key] ?? key;
  return str.replace(/\{(\w+)\}/g, (_, k) => vars[k] ?? '');
}

// ── Health grade ───────────────────────────────────────────────────────────
function computeGrade(run) {
  if (!run.totalTests) return 'F';
  const nonQ      = (run.allTests ?? []).filter(t => !t.quarantined);
  const total     = nonQ.length || 1;
  const passed    = nonQ.filter(t => t.status === 'passed' || t.status === 'flaky').length;
  const flakyN    = nonQ.filter(t => t.status === 'flaky').length;
  const passRate  = passed / total;
  const stability = 1 - (flakyN / total);
  const allT      = nonQ;
  const p75       = computeP75(allT.map(t => t.duration));
  const slowCount = allT.filter(t => t.duration > p75 * 1.5).length;
  const perfScore = 1 - (slowCount / total);
  const score     = (passRate * 0.6 + stability * 0.3 + perfScore * 0.1) * 100;
  if (score >= 95) return 'A';
  if (score >= 85) return 'B';
  if (score >= 70) return 'C';
  if (score >= 50) return 'D';
  return 'F';
}

function computeP75(durations) {
  if (!durations.length) return 0;
  const sorted = [...durations].sort((a, b) => a - b);
  return sorted[Math.floor(sorted.length * 0.75)];
}

function isSlowTest(t, p75) { return t.duration > p75 * 1.5; }

// ── Duration regression engine ─────────────────────────────────────────────
// regressionMap: key `${project}::${title}` → { rollingAvg, sampleCount }
// Built once per render() from all runs except the latest.
let regressionMap = new Map();

function buildRegressionMap() {
  regressionMap = new Map();
  if (runs.length < 2) return;

  const window_  = CONFIG.durationRegressionWindow    ?? 10;
  const minRuns  = CONFIG.durationRegressionMinRuns    ?? 3;
  const latest   = runs[0];

  // Only compute regression for tests present in the latest run
  const latestKeys = new Set(
    (latest.allTests ?? [])
      .filter(t => !t.quarantined && t.status !== 'skipped')
      .map(t => `${t.project}::${t.title}`)
  );

  for (const key of latestKeys) {
    const colonIdx = key.indexOf('::');
    const project  = key.slice(0, colonIdx);
    const title    = key.slice(colonIdx + 2);

    const priorRuns = runs.slice(1, 1 + window_);
    const durations = priorRuns.flatMap(run => {
      const t = (run.allTests ?? []).find(x => x.project === project && x.title === title);
      return (t && t.status !== 'skipped' && !t.quarantined && t.duration > 0) ? [t.duration] : [];
    });

    if (durations.length < minRuns) continue;

    const rollingAvg = durations.reduce((a, b) => a + b, 0) / durations.length;
    regressionMap.set(key, { rollingAvg, sampleCount: durations.length });
  }
}

function isRegressingTest(t) {
  if (!t || t.quarantined || t.status === 'skipped' || t.duration <= 0) return false;
  const key  = `${t.project}::${t.title}`;
  const data = regressionMap.get(key);
  if (!data) return false;
  return t.duration > data.rollingAvg * (CONFIG.durationRegressionThreshold ?? 1.5);
}

const buttons = document.querySelectorAll('.theme-btn');

function applyTheme(theme) {
  buttons.forEach(b => b.classList.remove('active'));
  document.querySelector(`.theme-btn[data-theme="${theme}"]`)?.classList.add('active');
  if (theme === 'system') {
    document.documentElement.removeAttribute('data-theme');
  } else {
    document.documentElement.setAttribute('data-theme', theme);
  }
}

buttons.forEach(btn => {
  btn.addEventListener('click', () => {
    const theme = btn.dataset.theme;
    localStorage.setItem('theme', theme);
    applyTheme(theme);
  });
});

          bottom: Math.max(a.bottom, b.bottom),
          width:  Math.max(a.right, b.right)  - Math.min(a.left, b.left),
          height: Math.max(a.bottom, b.bottom) - Math.min(a.top, b.top),
        }),

let tourStepIdx = 0;

window.startTour = function() {
  tourStepIdx = 0;
  document.getElementById('tourOverlay').classList.add('active');
  goToTourStep(0);
};

window.endTour = function() {
  document.getElementById('tourOverlay').classList.remove('active');
  document.getElementById('tourSpotlight').style.display = 'none';
  localStorage.setItem('pw-reporter-tour-done', '1');
};

window.nextTourStep = function() {
  if (tourStepIdx >= getTourSteps().length - 1) { endTour(); return; }
  tourStepIdx++;
  goToTourStep(tourStepIdx);
};

window.prevTourStep = function() {
  if (tourStepIdx <= 0) return;
  tourStepIdx--;
  goToTourStep(tourStepIdx);
};

function goToTourStep(idx) {
  const steps      = getTourSteps();
  const step       = steps[idx];
  const overlay    = document.getElementById('tourOverlay');
  const spotlight  = document.getElementById('tourSpotlight');
  const card       = document.getElementById('tourCard');

  if (!overlay.classList.contains('active')) return;
  if (step.beforeStep) step.beforeStep();

  document.getElementById('tourStepLabel').textContent = t('tour_step_of', {n: idx + 1, total: steps.length});
  document.getElementById('tourTitle').textContent     = step.title;
  // Support \n line breaks in body
  const bodyEl = document.getElementById('tourBody');
  bodyEl.innerHTML = step.body.split('\n').map(l => l ? `<span>${esc(l)}</span>` : '<br>').join('<br>');
  document.getElementById('tourPrev').style.display   = idx === 0 ? 'none' : '';
  document.getElementById('tourNext').textContent     = idx === steps.length - 1 ? t('tour_done') : t('tour_next');

  // Resolve target element
  let target = step.target;
  if (typeof target === 'function') target = target();
  if (typeof target === 'string')   target = document.querySelector(target);

  if (!target || step.position === 'center') {
    spotlight.style.display = 'none';
    positionTourCard(card, null, 'center');
  } else {
    const rect = typeof target.getBoundingClientRect === 'function'
      ? target.getBoundingClientRect()
      : null;
    if (!rect) { spotlight.style.display = 'none'; positionTourCard(card, null, 'center'); return; }
    const pad = 8;
    spotlight.style.display  = 'block';
    spotlight.style.top      = `${rect.top    - pad}px`;
    spotlight.style.left     = `${rect.left   - pad}px`;
    spotlight.style.width    = `${rect.width  + pad * 2}px`;
    spotlight.style.height   = `${rect.height + pad * 2}px`;
    positionTourCard(card, rect, step.position);
  }
}

function positionTourCard(card, rect, position) {
  const cardW  = 300;
  const cardH  = card.offsetHeight || 220;
  const vw     = window.innerWidth;
  const vh     = window.innerHeight;
  const margin = 16;
  const gap    = 14;

  if (!rect || position === 'center') {
    card.style.left = `${Math.max(margin, (vw - cardW) / 2)}px`;
    card.style.top  = `${Math.max(margin, (vh - cardH) / 2)}px`;
    return;
  }

  let top, left;
  if (position === 'bottom') {
    top  = rect.bottom + gap;
    left = rect.left + (rect.width - cardW) / 2;
  } else if (position === 'top') {
    top  = rect.top - cardH - gap;
    left = rect.left + (rect.width - cardW) / 2;
  } else if (position === 'right') {
    top  = rect.top + (rect.height - cardH) / 2;
    left = rect.right + gap;
  } else { // left
    top  = rect.top + (rect.height - cardH) / 2;
    left = rect.left - cardW - gap;
  }

  // Clamp to viewport
  card.style.left = `${Math.max(margin, Math.min(vw - cardW - margin, left))}px`;
  card.style.top  = `${Math.max(margin, Math.min(vh - cardH - margin, top))}px`;
}

function buildPrintReport(run) {
  const latest      = run;
  const projectName = document.getElementById('projectName')?.textContent || CONFIG.projectName || CONFIG.brandName;
  const grade       = computeGrade(latest);
  const latestRate  = latest.totalTests > 0 ? (latest.passed / latest.totalTests * 100).toFixed(1) : '0';
  const allT        = latest.allTests ?? [];
  const failures    = buildRecurringFailures();
  const maxCnt      = failures[0]?.cnt ?? 1;
  const trendRuns   = runs.slice(0, 7).reverse();

  const suites = new Map();
  allT.forEach(t => {
    const suite = t.file?.split('/').pop()?.replace(/\.spec\.(ts|js)$/, '') ?? 'Tests';
    if (!suites.has(suite)) suites.set(suite, []);
    suites.get(suite).push(t);
  });

  const sc = s => ({ passed:'pr-s-pass', failed:'pr-s-fail', flaky:'pr-s-flaky', skipped:'pr-s-skip' }[s] ?? 'pr-s-skip');

  return `
    <div class="pr-page">
      <div class="pr-header">
        <div>
          <div class="pr-brand">${esc(CONFIG.brandName)} · ${t('print_test_report')}</div>
          <div class="pr-project">${esc(projectName)}</div>
          <div class="pr-run-meta">Run ${esc(latest.runId ?? '')} · ${fmtDate(latest.timestamp)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div style="text-align:right">
            <div style="font-size:20px;font-weight:700;color:#fff;font-family:monospace">${latestRate}%</div>
            <div style="font-size:10px;color:#7b82a0;font-family:monospace">${t('print_pass_rate')}</div>
          </div>
          <div class="pr-grade pr-grade-${grade}">${grade}</div>
        </div>
      </div>

      <div class="pr-section-title">${t('print_run_summary')}</div>
      <div class="pr-kpi-row">
        <div class="pr-kpi"><div class="pr-kpi-label">${t('print_kpi_passed')}</div><div class="pr-kpi-value" style="color:#0f6e56">${latest.passed}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">${t('print_kpi_failed')}</div><div class="pr-kpi-value" style="color:#a32d2d">${latest.failed}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">${t('print_kpi_flaky')}</div><div class="pr-kpi-value" style="color:#854f0b">${latest.flaky ?? 0}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">${t('print_kpi_skipped')}</div><div class="pr-kpi-value" style="color:#888">${latest.skipped}</div></div>
        <div class="pr-kpi"><div class="pr-kpi-label">${t('print_kpi_duration')}</div><div class="pr-kpi-value" style="color:#185fa5;font-size:16px">${fmtDur(latest.duration)}</div></div>
      </div>

      <div class="pr-section-title">${t('print_trend_title', {n: trendRuns.length})}</div>
      ${trendRuns.map(r => {
        const rate = r.totalTests > 0 ? (r.passed / r.totalTests * 100) : 0;
        const col  = rate >= 80 ? '#2dd4a0' : rate >= 50 ? '#f5a623' : '#f25f5c';
        return `<div class="pr-trend-row">
          <div class="pr-trend-label">${fmtDate(r.timestamp).split(',')[0]}</div>
          <div class="pr-trend-bg"><div class="pr-trend-fill" style="width:${rate.toFixed(0)}%;background:${col}"></div></div>
          <div class="pr-trend-val">${rate.toFixed(0)}%</div>
        </div>`;
      }).join('')}

      ${failures.length ? `
        <div class="pr-section-title">${t('print_recurring_failures')}</div>
        ${failures.map(({ label, cnt }) => `
          <div class="pr-failure-row">
            <div class="pr-failure-count">${cnt}×</div>
            <div class="pr-failure-bar-wrap"><div class="pr-failure-bar" style="width:${(cnt/maxCnt*100).toFixed(0)}%"></div></div>
            <div class="pr-failure-msg">${esc(label)}</div>
          </div>`).join('')}` : ''}

      <div class="pr-section-title">${t('print_test_results_by_suite')}</div>
      ${[...suites.entries()].map(([suite, tests]) => `
        <div class="pr-suite-title">${esc(suite)}</div>
        ${tests.map(t => `
          <div class="pr-test-row">
            <span class="pr-test-name">${esc(t.title)}</span>
            <span class="pr-test-dur">${fmtDur(t.duration)}</span>
            <span class="pr-status ${sc(t.status)}">${t.status}</span>
          </div>`).join('')}`).join('')}

      <div class="pr-footer">
        <span>${t('print_generated_by')} ${esc(CONFIG.brandName)} · acahet</span>
        <span>${esc(latest.runId ?? '')}</span>
      </div>
    </div>`;
}

function exportPDF(runIdx = 0) {
  if (!runs.length) return;
  const el = document.getElementById('printReport');
  if (!el) return;
  el.innerHTML = buildPrintReport(runs[runIdx]);
  window.print();
}
window.exportPDF = exportPDF;

function exportCSV(scope = 'latest', runIdx = 0) {
  if (!runs.length) return;
  const csvEsc = v => {
    const s = String(v ?? '');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? `"${s.replace(/"/g, '""')}"` : s;
  };
  const headers = ['run_id','timestamp','suite','title','project','status','duration_ms','tags','error'];
  const rows = [headers.join(',')];
  let target;
  if (scope === 'all') {
    target = runs;
  } else if (scope === 'run') {
    target = [runs[runIdx]];
  } else {
    target = [runs[0]];
  }
  target.forEach(run => {
    (run.allTests ?? []).forEach(t => {
      const suite = t.file?.split('/').pop()?.replace(/\.spec\.(ts|js)$/, '') ?? '';
      rows.push([
        csvEsc(run.runId ?? ''),
        csvEsc(run.timestamp ?? ''),
        csvEsc(suite),
        csvEsc(t.title ?? ''),
        csvEsc(t.project ?? ''),
        csvEsc(t.status ?? ''),
        csvEsc(t.duration ?? ''),
        csvEsc((t.tags ?? []).join(';')),
        csvEsc((t.error ?? '').split('\n')[0])
      ].join(','));
    });
  });
  const blob = new Blob([rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const projectName = (CONFIG.projectName || CONFIG.brandName || 'tests').replace(/[^a-z0-9_-]/gi, '_');
  const suffix = scope === 'all' ? 'all_runs' : scope === 'run' ? `run_${runIdx}` : 'latest_run';
  a.href     = url;
  a.download = `${projectName}_${suffix}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
window.exportCSV = exportCSV;

window.toggleCsvDropdown = function(e) {

function openExportRunPicker(type) {
  exportPickerTarget = type;
  const modal = document.getElementById('exportRunPicker');
  const title = document.getElementById('erpTitle');
  const list = document.getElementById('erpList');
  title.textContent = t(type === 'pdf' ? 'erp_title_pdf' : 'erp_title_csv');
  list.innerHTML = runs.map((run, idx) => {
    const d = fmtDate(run.startedAt);
    const dur = fmtDur(run.duration);
    const pass = run.passed || 0;
    const fail = run.failed || 0;
    const flaky = run.flaky || 0;
    return `<div class="erp-run-row" onclick="confirmExportRun(${idx})">
      <span class="erp-run-date">${esc(d)}</span>
      <span class="erp-run-badges">
        ${pass > 0 ? `<span class="badge pass">${pass} passed</span>` : ''}
        ${fail > 0 ? `<span class="badge fail">${fail} failed</span>` : ''}
        ${flaky > 0 ? `<span class="badge flaky">${flaky} flaky</span>` : ''}

function closeExportRunPicker() {
  document.getElementById('exportRunPicker').classList.remove('open');

}

function confirmExportRun(idx) {
  if (exportPickerTarget === 'pdf') {
    exportPDF(idx);
  } else {
    exportCSV('run', idx);

  closeExportRunPicker();
}
