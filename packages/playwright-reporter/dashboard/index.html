// ── Sidebar ────────────────────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebarRuns');
  if (!el) return;

  el.innerHTML = runs.slice(0, 15).map((run, idx) => {
    const isPass = run.failed === 0;
    const rate   = run.totalTests > 0 ? Math.round(run.passed / run.totalTests * 100) : 0;
    return `
      <div class="sidebar-run ${idx === 0 ? 'active' : ''}"
           onclick="jumpToRun(${idx})">
        <span class="sidebar-run-dot" style="background:${isPass ? 'var(--pass)' : 'var(--fail)'}"></span>
        <div class="sidebar-run-info">
          <div class="sidebar-run-date">${fmtDate(run.timestamp)}</div>
          <div class="sidebar-run-stat">${rate}% · ${fmtDur(run.duration)}</div>
        </div>
      </div>`;
  }).join('');
}

// ── Sidebar filters ────────────────────────────────────────────────────────
function renderSidebarFilters() {
  const el = document.getElementById('sidebarFilters');
  if (!el) return;

  // Collect tags across all runs
  const tagCounts = new Map();
  const specCounts = new Map();
  runs.forEach(run => {
    (run.allTests ?? []).forEach(t => {
      (t.tags ?? []).forEach(tag => tagCounts.set(tag, (tagCounts.get(tag) ?? 0) + 1));
      const spec = t.file?.split('/').pop() ?? t.file;
      if (spec) specCounts.set(spec, (specCounts.get(spec) ?? 0) + 1);
    });
  });

  const tags  = [...tagCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 12);
  const specs = [...specCounts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 8);

  el.innerHTML = `
    ${tags.length ? `
      <div class="sidebar-filter-group-title">${t('sidebar_tags')}</div>
      <div class="sidebar-chips">
        ${tags.map(([tag, cnt]) => `
          <div class="sidebar-chip ${sidebarTagFilter===tag?'active':''}"
               data-tag="${esc(tag)}">
            ${esc(tag)}
            <span class="sidebar-chip-count">${cnt}</span>
          </div>`).join('')}
      </div>` : ''}
    ${specs.length ? `
      <div class="sidebar-filter-group-title">${t('sidebar_specs')}</div>
      <div class="sidebar-chips">
        ${specs.map(([spec, cnt]) => `
          <div class="sidebar-chip ${sidebarSpecFilter===spec?'active':''}"
               data-spec="${esc(spec)}">
            ${esc(spec)}
            <span class="sidebar-chip-count">${cnt}</span>
          </div>`).join('')}
      </div>` : ''}`;

  el.onclick = function(e) {
    const tagChip  = e.target.closest('.sidebar-chip[data-tag]');
    if (tagChip)  { toggleTagFilter(tagChip.dataset.tag);   return; }
    const specChip = e.target.closest('.sidebar-chip[data-spec]');
    if (specChip) toggleSpecFilter(specChip.dataset.spec);
  };
}

function applyTestFilter(value) {
  // If already on dashboard or search, the test grid is already in the DOM —
  // just switch to the per-test tab and filter directly, no re-render needed.
  // If on another page (trends, gallery, quarantine), navigate to dashboard first.
  const doFilter = () => {
    const input = document.getElementById('testSearch');
    if (!input) return;
    input.value = value ?? '';
    const testBtn = document.querySelectorAll('.tab-btn')[1];
    if (testBtn) switchTab('test', testBtn);
    filterTests();
  };

  if (currentPage === 'dashboard' || currentPage === 'search') {
    doFilter();
  } else {
    navTo('dashboard', document.getElementById('nav-dashboard'));
    setTimeout(doFilter, 60);
  }
}

window.toggleTagFilter = function(tag) {
  sidebarTagFilter = sidebarTagFilter === tag ? null : tag;
  sidebarSpecFilter = null;
  renderSidebarFilters();
  applyTestFilter(sidebarTagFilter);
};

window.toggleSpecFilter = function(spec) {
  sidebarSpecFilter = sidebarSpecFilter === spec ? null : spec;
  sidebarTagFilter = null;
  renderSidebarFilters();
  applyTestFilter(sidebarSpecFilter);
};

// ── Stacked bar chart ──────────────────────────────────────────────────────
function renderBarChart() {
  const el = document.getElementById('barChart');
  const display = runs.slice(0, 30).reverse();
  const maxTotal = Math.max(...display.map(r => r.totalTests), 1);

  el.innerHTML = display.map(r => {
    const pct = v => ((v / maxTotal) * 132).toFixed(1); // 132px usable height
    const passH  = pct(r.passed);
    const failH  = pct(r.failed);
    const skipH  = pct(r.skipped);
    const stackH = (+passH + +failH + +skipH);
    const date   = fmtDate(r.timestamp).split(',')[0];
    const rate   = r.totalTests > 0 ? (r.passed / r.totalTests * 100).toFixed(0) : 0;

    return `
      <div class="bar-col">
        <div class="bar-tooltip">
          <div style="color:var(--pass)">${r.passed} ${t('bar_passed')}</div>
          ${r.failed  > 0 ? `<div style="color:var(--fail)">${r.failed} ${t('bar_failed')}</div>` : ''}
          ${r.flaky   > 0 ? `<div style="color:var(--flaky)">${r.flaky} ${t('bar_flaky')}</div>` : ''}
          ${r.skipped > 0 ? `<div style="color:var(--skip)">${r.skipped} ${t('bar_skipped')}</div>` : ''}
          <div style="color:var(--muted);margin-top:2px">${rate}% ${t('bar_pass_rate')} · ${fmtDur(r.duration)}</div>
        </div>
        <div class="bar-stack" style="height:${stackH}px">
          ${r.skipped > 0 ? `<div class="bar-seg-skip"  style="height:${skipH}px"></div>` : ''}
          ${r.failed  > 0 ? `<div class="bar-seg-fail"  style="height:${failH}px"></div>` : ''}
          <div class="bar-seg-pass" style="height:${passH}px"></div>
        </div>
        <div class="bar-lbl">${date}</div>
      </div>`;
  }).join('');
}

// ── Duration line chart (SVG) ─────────────────────────────────────────────
function renderDurChart() {
  const el = document.getElementById('durChart');
  const display = runs.slice(0, 30).reverse();
  if (display.length < 2) { el.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:8px">${t('chart_not_enough_data_yet')}</div>`; return; }

  const W = 300, H = 70;
  const durations = display.map(r => r.duration);
  const minD = Math.min(...durations);
  const maxD = Math.max(...durations);
  const range = maxD - minD || 1;

  const pts = display.map((r, i) => {
    const x = (i / (display.length - 1)) * W;
    const y = H - ((r.duration - minD) / range) * (H - 10) - 4;
    return [x.toFixed(1), y.toFixed(1)];
  });

  const polyline = pts.map(p => p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${H} ` +
    pts.map(p => `L${p[0]},${p[1]}`).join(' ') +
    ` L${pts[pts.length-1][0]},${H} Z`;

  el.innerHTML = `
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="durGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity=".25"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${areaPath}" fill="url(#durGrad)"/>
      <polyline points="${polyline}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      ${pts.map((p, i) => `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="var(--accent)" opacity=".8">
        <title>${fmtDur(display[i].duration)} · ${fmtDate(display[i].timestamp)}</title>
      </circle>`).join('')}
    </svg>`;
}

window.switchTab = function(view, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('overallView').style.display = view === 'overall' ? 'block' : 'none';
  const tv = document.getElementById('testView');
  tv.style.display = view === 'test' ? 'block' : 'none';
  if (view === 'test') tv.classList.add('active');

  // Keep sidebar nav in sync with which tab is active
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  const navId = view === 'test' ? 'nav-search' : 'nav-dashboard';
  document.getElementById(navId)?.classList.add('active');
  currentPage = view === 'test' ? 'search' : 'dashboard';
};

function buildTrendMiniPanel(label, values, display, fmt, color, higherIsBetter) {
  const current = values[values.length - 1] ?? 0;
  const prev    = values[values.length - 2] ?? current;
  const delta   = prev !== 0 ? ((current - prev) / Math.abs(prev) * 100) : 0;
  const deltaGood = higherIsBetter ? delta >= 0 : delta <= 0;
  const deltaStr  = delta === 0 ? t('trends_stable')
    : `${delta > 0 ? '+' : ''}${delta.toFixed(0)}${t('trends_vs_prev')}`;
  const deltaColor = delta === 0 ? 'var(--muted)' : deltaGood ? 'var(--pass)' : 'var(--fail)';

  if (values.length < 2) {
    return `<div class="trend-mini-panel">
      <div class="trend-mini-title">${label}</div>
      <div class="trend-mini-current" style="color:${color}">${fmt(current)}</div>
      <div style="color:var(--muted);font-family:var(--mono);font-size:11px">${t('trends_not_enough')}</div>
    </div>`;
  }

  const W = 280, H = 55;
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;

  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * W;
    const y = H - ((v - minV) / range) * (H - 8) - 4;
    return [x.toFixed(1), y.toFixed(1)];
  });

  const polyline = pts.map(p => p.join(',')).join(' ');
  const areaPath = `M${pts[0][0]},${H} ${pts.map(p=>`L${p[0]},${p[1]}`).join(' ')} L${pts[pts.length-1][0]},${H} Z`;

  const dotsSvg = pts.map((p, i) =>
    `<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="${color}" opacity=".85">
      <title>${fmt(values[i])} · ${fmtDate(display[i].timestamp)}</title>
    </circle>`
  ).join('');

  return `
    <div class="trend-mini-panel">
      <div class="trend-mini-title">
        ${label}
        <span style="color:${deltaColor};font-size:10px">${deltaStr}</span>
      </div>
      <div class="trend-mini-current" style="color:${color}">${fmt(current)}</div>
      <div class="trend-mini-svg">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="tg-${label.replace(/\s/g,'')}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity=".2"/>
              <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaPath}" fill="url(#tg-${label.replace(/\s/g,'')})"/>
          <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          ${dotsSvg}
        </svg>
      </div>
      <div class="trend-mini-footer">
        <span>${t('trends_min')} ${fmt(Math.min(...values))}</span>
        <span>${t('trends_avg')} ${fmt(values.reduce((a,b)=>a+b,0)/values.length)}</span>
        <span>${t('trends_max')} ${fmt(Math.max(...values))}</span>
      </div>
    </div>`;
}

// ── Test index & grid ──────────────────────────────────────────────────────
function buildTestIndex() {
  const seen = new Map();
  runs.forEach(run => {
    (run.allTests ?? []).forEach(t => {
      const key = `${t.project}::${t.title}`;
      if (!seen.has(key)) seen.set(key, { title: t.title, file: t.file ?? '', project: t.project, tags: t.tags ?? [], quarantined: !!t.quarantined, key });
      else if (t.quarantined) seen.get(key).quarantined = true;
    });
  });
  allTests = [...seen.values()].sort((a, b) =>
    a.project !== b.project ? a.project.localeCompare(b.project) : a.title.localeCompare(b.title)
  );
}

function getSparkline(testKey) {
  // Last 10 runs, oldest first
  const [project, ...rest] = testKey.split('::');
  const title = rest.join('::');
  return runs.slice(0, 10).reverse().map(run => {
    const t = (run.allTests ?? []).find(x => x.project === project && x.title === title);
    return t ? statusClass(t.status) : 'none';
  });
}

function renderTestGrid(tests) {
  const grid = document.getElementById('testGrid');
  if (!grid) return;

  if (!tests.length) {
    grid.innerHTML = '<div style="color:var(--muted);font-size:13px;padding:16px">' + t('search_no_tests') + '</div>';
    return;
  }

  const tl = t; // alias to avoid shadowing by map param `t` (test object)
  grid.innerHTML = tests.map(t => {
    const spark = getSparkline(t.key);
    const tagsHtml = t.tags.length
      ? `<div class="test-tags">${t.tags.map(g => `<span class="tag">${esc(g)}</span>`).join('')}</div>`
      : '';
    return `
      <div class="test-card ${selectedTestKey === t.key ? 'selected' : ''}"
           data-key="${esc(t.key)}">
        <div class="test-card-name">${esc(t.title)}</div>
        <div class="test-card-meta">
          <span class="test-card-project">${esc(t.project)}</span>
          ${t.quarantined ? `<span class="badge quarantine" style="font-size:10px;padding:1px 5px">${tl('test_quarantined')}</span>` : ''}
          <div class="sparkline" title="${tl('quarantine_sparkline_title')}">
            ${spark.map(s => `<span class="spark-dot ${s}"></span>`).join('')}
          </div>
        </div>
        ${tagsHtml}
      </div>`;
  }).join('');

  // Re-attach delegation each render (grid is re-created each time)
  grid.onclick = function(e) {
    const card = e.target.closest('.test-card');
    if (!card) return;
    const key = card.dataset.key;
    if (key) selectTest(key);
  };
}

window.filterTests = function() {
  const q = document.getElementById('testSearch').value.toLowerCase();
  const filtered = !q ? allTests : allTests.filter(t =>
    t.title.toLowerCase().includes(q) ||
    t.project.toLowerCase().includes(q) ||
    (t.file ?? '').toLowerCase().includes(q) ||
    t.tags.some(g => g.toLowerCase().includes(q))
  );
  renderTestGrid(filtered);
};

function selectTest(key) {
  selectedTestKey = key;
  const hint = document.getElementById('testSelectHint');
  if (hint) hint.style.display = 'none';
  const q = document.getElementById('testSearch')?.value?.toLowerCase() ?? '';
  const filtered = q
    ? allTests.filter(t => t.title.toLowerCase().includes(q) || t.project.toLowerCase().includes(q) || t.tags.some(g => g.toLowerCase().includes(q)))
    : allTests;
  renderTestGrid(filtered);
  const [project, ...rest] = key.split('::');
  const title = rest.join('::');
  renderTestDetail(project, title);
}
window.selectTest = selectTest;

function renderTestDetail(project, title) {
  const detail = document.getElementById('testDetail');
  if (!detail) return;

  // Collect history oldest-first for charts, newest-first for the run list
  const historyAsc = runs.slice().reverse().map(run => {
    const t = (run.allTests ?? []).find(x => x.project === project && x.title === title);
    return t ? { ts: run.timestamp, runId: run.runId, ...t } : null;
  }).filter(Boolean);

  const historyDesc = [...historyAsc].reverse();

  const passed      = historyAsc.filter(h => h.status === 'passed').length;
  const failed      = historyAsc.filter(h => h.status === 'failed').length;
  const flaky       = historyAsc.filter(h => h.status === 'flaky').length;
  const rate        = historyAsc.length ? (passed / historyAsc.length * 100).toFixed(1) : 0;
  const isQuarantined = historyDesc.some(h => h.quarantined);
  const detailKey     = `${project}::${title}`;
  const regrData      = regressionMap.get(detailKey);
  const isRegressing  = !!(historyDesc[0] && regrData &&
    historyDesc[0].duration > regrData.rollingAvg * (CONFIG.durationRegressionThreshold ?? 1.5));

  // Failure-point comparison (newest-first scan).
  // For each failed/flaky entry, compare its normalized error key against the nearest
  // older failure to answer: "did this test fail at the same place as last time?"
  //   true  → SAME POINT  (consistent failure location)
  //   false → NEW POINT   (failure moved to a different location)
  //   null  → not a failure, or the oldest failure in history (no prior to compare)
  const failureKeys = historyDesc.map(h =>
    (h.status === 'failed' || h.status === 'flaky') ? normalizeErrorKey(h.error) : null
  );
  const samePointFlags = historyDesc.map((h, i) => {
    if (h.status !== 'failed' && h.status !== 'flaky') return null;
    const myKey = failureKeys[i];
    for (let j = i + 1; j < failureKeys.length; j++) {
      if (failureKeys[j] !== null) return myKey === failureKeys[j];
    }
    return null; // no prior failure to compare against
  });

  // Pull annotations from the most recent run that has them
  const annotations = historyDesc.find(h => h.annotations?.length)?.annotations ?? [];
  const annotTitle  = annotations.find(a => a.type === 'title' || a.type === 'description')?.description ?? null;
  const annotDesc   = annotations.find(a => a.type === 'description')?.description ?? null;
  // All non-title/description annotations shown as metadata chips
  const metaAnnots  = annotations.filter(a => a.type !== 'title' && a.type !== 'description');

  detail.innerHTML = `
    <div class="test-detail">

      <!-- Header: name + summary stats -->
      <div class="test-detail-header">
        <div>
          <div class="test-detail-name" style="display:flex;align-items:center;gap:8px">
            <span>${esc(title)}</span>
            ${isQuarantined ? `<span class="badge quarantine">${t('test_quarantined')}</span>` : ''}
            ${isRegressing  ? `<span class="regressing-badge">${t('test_regressing')}</span>`  : ''}
          </div>
          ${metaAnnots.length ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
            ${metaAnnots.map(a => `<span class="tag" style="background:rgba(124,159,255,.12);color:var(--accent2);border-color:rgba(124,159,255,.2)">${esc(a.type)}${a.description ? ': ' + esc(a.description) : ''}</span>`).join('')}
          </div>` : ''}
        </div>
        <div class="test-detail-stats">
          <div class="test-detail-stat">
            <div class="test-detail-stat-value" style="color:var(--pass)">${passed}</div>
            <div class="test-detail-stat-label">${t('detail_passed')}</div>
          </div>
          ${failed > 0 ? `<div class="test-detail-stat">
            <div class="test-detail-stat-value" style="color:var(--fail)">${failed}</div>
            <div class="test-detail-stat-label">${t('detail_failed')}</div>
          </div>` : ''}
          ${flaky > 0 ? `<div class="test-detail-stat">
            <div class="test-detail-stat-value" style="color:var(--flaky)">${flaky}</div>
            <div class="test-detail-stat-label">${t('detail_flaky')}</div>
          </div>` : ''}
          <div class="test-detail-stat">
            <div class="test-detail-stat-value" style="color:${rate>=80?'var(--pass)':rate>=50?'var(--flaky)':'var(--fail)'}">${rate}<span style="font-size:14px">%</span></div>
            <div class="test-detail-stat-label">${t('detail_pass_rate')}</div>
          </div>
          ${regrData ? `<div class="test-detail-stat">
            <div class="test-detail-stat-value" style="color:${isRegressing?'var(--regression)':'var(--muted)'};font-size:16px">${fmtDur(Math.round(regrData.rollingAvg))}</div>
            <div class="test-detail-stat-label">${t('detail_rolling_avg')}</div>
          </div>` : ''}
        </div>
      </div>

      <!-- Annotation description block (if any) -->
      ${annotDesc ? `
        <div class="test-annot-block">
          <div class="test-annot-type">${t('detail_description')}</div>
          <div class="test-annot-text">${esc(annotDesc)}</div>

      <!-- Sub-panels: duration chart + failure reasons -->
      <div class="detail-panels">

      </div>

      <!-- Per-run history list -->
      ${historyDesc.map((h, i) => renderTrendRow(h, i, samePointFlags[i])).join('')}
    </div>`;

  detail.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Duration mini-chart ────────────────────────────────────────────────────
function buildDurationPanel(historyAsc) {
  if (historyAsc.length < 2) {
    return `<div class="detail-sub-panel">
      <div class="detail-sub-title">${t('dur_over_time')}</div>
      <div class="no-failures-msg">${t('dur_not_enough')}</div>
    </div>`;
  }

  const durations = historyAsc.map(h => h.duration);
  const minD  = Math.min(...durations);
  const maxD  = Math.max(...durations);
  const range = maxD - minD || 1;
  const W = 260, H = 60;

  const pts = historyAsc.map((h, i) => {
    const x = (i / (historyAsc.length - 1)) * W;
    const y = H - ((h.duration - minD) / range) * (H - 8) - 4;
    return [x.toFixed(1), y.toFixed(1), h];
  });

  const polyline = pts.map(p => `${p[0]},${p[1]}`).join(' ');
  const areaPath = `M${pts[0][0]},${H} ` +
    pts.map(p => `L${p[0]},${p[1]}`).join(' ') +
    ` L${pts[pts.length-1][0]},${H} Z`;

  // Rolling average reference line — avg of up to `window_` prior samples at each point
  const rWindow    = CONFIG.durationRegressionWindow    ?? 10;
  const rMinRuns   = CONFIG.durationRegressionMinRuns   ?? 3;
  const rThreshold = CONFIG.durationRegressionThreshold ?? 1.5;
  const avgPts = historyAsc.map((h, i) => {
    if (i === 0) return null;
    const prior = historyAsc.slice(Math.max(0, i - rWindow), i)
      .filter(x => x.status !== 'skipped' && x.duration > 0);
    if (prior.length < rMinRuns) return null;
    const avg = prior.reduce((s, x) => s + x.duration, 0) / prior.length;
    const x = (i / (historyAsc.length - 1)) * W;
    const y = H - ((avg - minD) / range) * (H - 8) - 4;
    return { x: x.toFixed(1), y: y.toFixed(1), avg, exceeded: h.duration > avg * rThreshold };
  });
  const avgPolylineStr = avgPts.filter(Boolean).map(p => `${p.x},${p.y}`).join(' ');
  const avgLineSvg = avgPolylineStr
    ? `<polyline points="${avgPolylineStr}" fill="none" stroke="var(--regression)"
         stroke-width="1" stroke-dasharray="3,3" stroke-opacity=".7"/>`
    : '';

  // Colour dots — amber when exceeding rolling avg threshold
  const dots = pts.map(([x, y, h], i) => {
    const ap = avgPts[i];
    const exceeded = ap?.exceeded ?? false;
    const c = exceeded         ? 'var(--regression)'
            : h.status === 'passed' ? 'var(--pass)'
            : h.status === 'flaky'  ? 'var(--flaky)'
            : 'var(--fail)';
    const avgLabel = ap ? ` · avg ${fmtDur(Math.round(ap.avg))}` : '';
    return `<circle cx="${x}" cy="${y}" r="${exceeded ? 4 : 3}" fill="${c}">
      <title>${fmtDur(h.duration)} · ${h.status} · ${fmtDate(h.ts)}${avgLabel}</title>
    </circle>`;
  }).join('');

  // Delta: compare last run to previous run
  const last = durations[durations.length - 1];
  const prev = durations[durations.length - 2];
  const deltaPct = ((last - prev) / prev * 100);
  const deltaSign = deltaPct > 5 ? 'up' : deltaPct < -5 ? 'down' : 'flat';
  const lastAvgPt = avgPts.filter(Boolean).at(-1);
  const regressingLatest = lastAvgPt?.exceeded ?? false;
  const deltaLabel = (deltaSign === 'flat' ? t('dur_stable') : `${deltaPct > 0 ? '+' : ''}${deltaPct.toFixed(0)}${t('dur_vs_prev')}`)
    + (regressingLatest ? t('dur_regressing') : '');

  return `
    <div class="detail-sub-panel">
      <div class="detail-sub-title">
        ${t('dur_over_time')}
        <span class="dur-delta ${deltaSign}">${deltaLabel}</span>
      </div>
      <div class="dur-mini">
        <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
          <defs>
            <linearGradient id="tdGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--accent)" stop-opacity=".18"/>
              <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path d="${areaPath}" fill="url(#tdGrad)"/>
          <polyline points="${polyline}" fill="none" stroke="var(--accent)" stroke-width="1.5"
            stroke-linejoin="round" stroke-linecap="round" stroke-opacity=".5"/>
          ${avgLineSvg}
          ${dots}
        </svg>
      </div>
      <div class="dur-mini-meta">
        <span>${t('dur_min')} ${fmtDur(minD)}</span>
        <span>${t('dur_avg')} ${fmtDur(Math.round(durations.reduce((a,b)=>a+b,0)/durations.length))}</span>
        <span>${t('dur_max')} ${fmtDur(maxD)}</span>
        ${avgPolylineStr ? `<span style="color:var(--regression)">${t('dur_rolling_avg')}</span>` : ''}
      </div>
    </div>`;
}

// ── Failure reasons panel ──────────────────────────────────────────────────
function buildFailureReasonsPanel(historyAsc) {
  const failures = historyAsc.filter(h => h.status === 'failed' || h.status === 'flaky');

  if (!failures.length) {
    return `<div class="detail-sub-panel">
      <div class="detail-sub-title">${t('failure_reasons')}</div>
      <div class="no-failures-msg" style="color:var(--pass)">${t('failure_none')}</div>
    </div>`;
  }

  // Group errors by normalised message — strip line numbers / file paths
  // so the same logical error groups together even if the stack changes slightly
  const counts = new Map();
  for (const h of failures) {
    const key = normalizeErrorKey(h.error ?? '(no error message)') ?? '';
    const prev = counts.get(key) ?? { count: 0, isFlaky: false };
    counts.set(key, {
      count: prev.count + 1,
      isFlaky: prev.isFlaky || h.status === 'flaky',
      latest: h.ts,
    });
  }

  // Sort by frequency desc
  const sorted = [...counts.entries()].sort((a, b) => b[1].count - a[1].count);
  const maxCount = sorted[0][1].count;

  const rows = sorted.slice(0, 6).map(([label, { count, isFlaky }]) => {
    const pct = (count / maxCount * 100).toFixed(0);
    const times = count === 1 ? t('failure_once') : t('failure_times', {n: count});
    return `
      <div class="reason-row">
        <div class="reason-row-header">
          <span class="reason-label" title="${esc(label)}">${esc(label)}</span>
          <span class="reason-count">${times}</span>
        </div>
        <div class="reason-bar-track">
          <div class="reason-bar-fill ${isFlaky ? 'flaky' : ''}" style="width:${pct}%"></div>
        </div>
      </div>`;
  }).join('');

  const more = sorted.length > 6
    ? `<div class="reason-count" style="margin-top:4px">${t('failure_more', {n: sorted.length - 6})}</div>`
    : '';

  return `
    <div class="detail-sub-panel">
      <div class="detail-sub-title">
        ${t('failure_reasons')}
        <span>${failures.length === 1 ? t('failure_total_one') : t('failure_total_many', {n: failures.length})}</span>
      </div>
      <div class="reason-list">${rows}</div>
      ${more}
    </div>`;
}

// ── Runs list ──────────────────────────────────────────────────────────────
function renderRunsList() {
  const el = document.getElementById('runsList');

  el.innerHTML = runs.map((run, idx) => {
    const allT   = run.allTests ?? [];
    const isPass = run.failed === 0;
    const p75    = computeP75(allT.map(t => t.duration));

    const isLatest     = idx === 0;
    const regressingInRun = isLatest ? allT.filter(t => isRegressingTest(t)).length : 0;
    const filteredT    = (isLatest && activeFilter)
      ? allT.filter(t => {
          if (activeFilter === 'quarantine')  return t.quarantined;
          if (activeFilter === 'regressing')  return isRegressingTest(t);
          return t.status === activeFilter;
        })
      : allT;
    const notable      = filteredT.filter(t => t.status === 'failed' || t.status === 'flaky');
    const displayTests = (isLatest && activeFilter) ? filteredT : notable;
    const hasMore      = !activeFilter && allT.length > notable.length;
    const isFiltered   = isLatest && activeFilter;

    return `
      <div class="run-card" id="run-${idx}">
        <div class="run-card-header" onclick="toggleRun(${idx})">
          <div class="run-card-left">
            <span class="run-status-dot" style="background:${isPass ? 'var(--pass)' : 'var(--fail)'}"></span>
            <span class="run-card-ts">${fmtDate(run.timestamp)}</span>
            <div class="run-badges">
              <span class="badge pass">${run.passed} ${t('badge_passed')}</span>
              ${run.failed      > 0 ? `<span class="badge fail">${run.failed} ${t('badge_failed')}</span>`             : ''}
              ${run.flaky       > 0 ? `<span class="badge flaky">${run.flaky} ${t('badge_flaky')}</span>`             : ''}
              ${run.skipped     > 0 ? `<span class="badge skip">${run.skipped} ${t('badge_skipped')}</span>`           : ''}
              ${(run.quarantined??0) > 0 ? `<span class="badge quarantine">${run.quarantined} ${t('badge_quarantined')}</span>` : ''}
              ${regressingInRun > 0 ? `<span class="badge regression">${regressingInRun} ${t('badge_regressing')}</span>` : ''}
            </div>
          </div>
          <div class="run-card-right">
            <span class="run-dur">${fmtDur(run.duration)}</span>
            ${allT.length > 0 ? `<span class="run-chevron" id="chev-${idx}">▼</span>` : ''}
          </div>
        </div>
        ${allT.length > 0 ? `
          <div class="run-detail ${isLatest && activeFilter ? 'open' : ''}" id="detail-${idx}">
            ${isFiltered ? `
              <div class="filter-banner">
                <span class="filter-banner-label">${t('filter_banner_showing')} <strong>${filteredT.length}</strong> ${t('badge_' + (activeFilter === 'quarantine' ? 'quarantined' : activeFilter))} ${filteredT.length !== 1 ? t('filter_banner_tests') : t('filter_banner_test')} ${t('filter_banner_from_run')}</span>
                <button class="filter-banner-clear" onclick="clearFilter()">${t('filter_show_all_btn')}</button>
              </div>` :
              notable.length > 0 ? `
              <div class="run-detail-toggle">
                <span class="detail-label">${t('run_failed_flaky', {n: notable.length})}</span>
                ${hasMore ? `<button class="show-all-btn" id="showall-${idx}" onclick="showAllTests(${idx})">${t('run_show_all', {n: allT.length})}</button>` : ''}
              </div>` :
              `<div class="run-detail-toggle">
                <span class="detail-label">${t('run_all_tests', {n: allT.length})}</span>
              </div>`
            }
            <div id="tests-${idx}">
              ${displayTests.length ? renderTestRows(displayTests, p75) : `<div style="font-family:var(--mono);font-size:12px;color:var(--muted);padding:8px 0">${activeFilter === 'failed' ? t('run_no_test_failed') : t('run_no_filter_tests', {status: t('badge_' + (activeFilter === 'quarantine' ? 'quarantined' : activeFilter))})}</div>`}
            </div>
          </div>` : ''}
      </div>`;
  }).join('');

  if (activeFilter) {
    const chev = document.getElementById('chev-0');
    if (chev) chev.classList.add('open');
  }
}

function renderTestRows(tests, p75 = 0) {
  const tr = t; // alias to avoid shadowing by map param `t` (test object)
  const isImagePath = p => /\.(png|jpg|jpeg|webp)$/i.test(p);
  return tests.map((t, i) => {
    const errId      = `tre-${i}-${Math.random().toString(36).slice(2,7)}`;
    const slow       = p75 > 0 && isSlowTest(t, p75);
    const regressing = isRegressingTest(t);
    const shotSrc    = t.artifacts?.screenshot ||
      (t.attachmentPaths ?? []).find(isImagePath) || null;

    // Register screenshot in the global registry so we don't embed large data URIs in attributes
    let shotKey = null;
    if (shotSrc) {
      shotKey = `s${_shotSeq++}`;
      _shotReg.set(shotKey, { src: shotSrc, title: t.title });
    }

    return `
    <div class="test-row ${statusClass(t.status)}${t.quarantined ? ' quarantine' : ''}">
      <div class="test-row-body">
        <div class="test-row-title" style="display:flex;align-items:center;gap:6px">
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.title)}</span>
          ${t.quarantined ? `<span class="badge quarantine">${tr('test_quarantined')}</span>` : ''}
          ${slow       ? `<span class="slow-badge">${tr('test_slow')}</span>`            : ''}
          ${regressing ? `<span class="regressing-badge">${tr('test_regressing')}</span>` : ''}
        </div>
        <div class="test-row-meta">
          <span>${esc(t.file)}</span>
          <span>${esc(t.project)}</span>
          <span>${fmtDur(t.duration)}</span>
        </div>
        ${t.error ? `
          <button class="test-row-error-toggle" onclick="toggleRowError('${errId}')">
            <span class="test-row-error-icon" id="icon-${errId}">▶</span>
            ${tr('test_error')}
          </button>
          <div class="test-row-error" id="${errId}">${esc(t.error)}</div>` : ''}
        ${(t.artifacts?.trace || shotKey) ? `
          <div class="artifact-links">
            ${t.artifacts?.trace ? `<a href="${safePath(t.artifacts.trace)}" download class="artifact-link">${tr('artifact_trace')}</a>` : ''}
            ${shotKey ? `<button class="artifact-link screenshot-link" data-shot-key="${shotKey}" onclick="openLightboxKey(this.dataset.shotKey)">${tr('artifact_screenshot')}</button>` : ''}
          </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

// ── Main render ────────────────────────────────────────────────────────────
function render() {
  const latest = runs[0];
  const totalRuns = runs.length;
  const avgPass = runs.reduce((s, r) =>
    s + (r.totalTests > 0 ? r.passed / r.totalTests * 100 : 0), 0) / runs.length;
  const latestRate = latest.totalTests > 0
    ? (latest.passed / latest.totalTests * 100).toFixed(1)
    : '0.0';

  document.getElementById('topbarMeta').textContent =
    t('topbar_meta', {n: totalRuns, date: fmtDate(latest.timestamp)});

  buildTestIndex();
  buildRegressionMap();
  renderSidebar();
  renderSidebarFilters();
  const exportBtn = document.getElementById('exportBtn');
  if (exportBtn) exportBtn.style.display = 'inline-flex';
  const exportCsvWrap = document.getElementById('exportCsvWrap');
  if (exportCsvWrap) exportCsvWrap.style.display = 'flex';
  const exportPdfWrap = document.getElementById('exportPdfWrap');
  if (exportPdfWrap) exportPdfWrap.style.display = 'flex';
  renderMainContent(latest, totalRuns, avgPass, latestRate);
}

// ── Trends page ────────────────────────────────────────────────────────────
function renderTrendsPage() {
  const el = document.getElementById('trendsPage');
  if (!el) return;

  const display = runs.slice(0, 30).reverse();

  const passRates  = display.map(r => r.totalTests > 0 ? (r.passed / r.totalTests * 100) : 0);
  const durations  = display.map(r => r.duration);
  const flakyCnts  = display.map(r => r.flaky ?? 0);
  const slowCnts   = display.map(r => {
    const allT = r.allTests ?? [];
    const p75  = computeP75(allT.map(t => t.duration));
    return allT.filter(t => isSlowTest(t, p75)).length;
  });

  const tWindow    = CONFIG.durationRegressionWindow    ?? 10;
  const tMinRuns   = CONFIG.durationRegressionMinRuns   ?? 3;
  const tThreshold = CONFIG.durationRegressionThreshold ?? 1.5;
  const regressingCnts = display.map(r => {
    const fullIdx = runs.findIndex(x => x.runId === r.runId);
    if (fullIdx < 0) return 0;
    return (r.allTests ?? []).filter(t => {
      if (t.quarantined || t.status === 'skipped' || t.duration <= 0) return false;
      const prior = runs.slice(fullIdx + 1, fullIdx + 1 + tWindow).flatMap(pr => {
        const x = (pr.allTests ?? []).find(x => x.project === t.project && x.title === t.title);
        return (x && x.status !== 'skipped' && x.duration > 0) ? [x.duration] : [];
      });
      if (prior.length < tMinRuns) return false;
      const avg = prior.reduce((a, b) => a + b, 0) / prior.length;
      return t.duration > avg * tThreshold;
    }).length;
  });

  el.innerHTML = `
    <div class="section-header" style="margin-bottom:20px">
      <span class="section-title">${t('trends_title', {n: display.length})}</span>
    </div>
    <div class="trends-grid">
      ${buildTrendMiniPanel(t('trends_pass_rate'), passRates, display, v => v.toFixed(1)+'%', 'var(--pass)', true)}
      ${buildTrendMiniPanel(t('trends_duration'), durations, display, v => fmtDur(v), 'var(--accent)', false)}
      ${buildTrendMiniPanel(t('trends_flaky_tests'), flakyCnts, display, v => v+'', 'var(--flaky)', false)}
      ${buildTrendMiniPanel(t('trends_slow_tests'), slowCnts, display, v => v+'', '#a78bfa', false)}
      ${buildTrendMiniPanel(t('trends_regressing'), regressingCnts, display, v => v+'', 'var(--regression)', false)}
    </div>`;
}

// ── Gallery page ────────────────────────────────────────────────────────────
function renderGalleryPage() {
  const el = document.getElementById('galleryPage');
  if (!el) return;

  const isImagePath = p => /\.(png|jpg|jpeg|webp)$/i.test(p);

  // Support both artifacts.screenshot (old reporter) and attachmentPaths images (new reporter)
  const groups = runs.map(run => {
    const shots = (run.allTests ?? []).flatMap(t => {
      if (t.artifacts?.screenshot) return [{ src: t.artifacts.screenshot, t }];
      const fromAttachments = (t.attachmentPaths ?? []).filter(isImagePath);
      return fromAttachments.length ? [{ src: fromAttachments[0], t }] : [];
    });
    return { run, shots };
  }).filter(g => g.shots.length > 0);

  if (!groups.length) {
    el.innerHTML = `
      <div class="section-header" style="margin-bottom:20px">
        <span class="section-title">${t('gallery_title')}</span>
      </div>
      <div class="gallery-empty">
        ${t('gallery_none')}<br>${t('gallery_hint')}
      </div>`;
    return;
  }

  const totalShots = groups.reduce((s, g) => s + g.shots.length, 0);

  el.innerHTML = `
    <div class="section-header" style="margin-bottom:20px">
      <span class="section-title">${totalShots === 1 ? t('gallery_title_with_count', {n: totalShots}) : t('gallery_title_with_count_pl', {n: totalShots})}</span>
    </div>
    ${groups.map(({ run, shots }) => `
      <div class="gallery-run-group">
        <div class="gallery-run-header">
          <span class="gallery-run-dot" style="background:${run.failed===0?'var(--pass)':'var(--fail)'}"></span>
          <span class="gallery-run-ts">${fmtDate(run.timestamp)}</span>
          <span class="gallery-run-count">${shots.length !== 1 ? t('gallery_screenshots') : t('gallery_screenshot')} (${shots.length})</span>
        </div>
        <div class="gallery-grid">
          ${shots.map(({ src, t }) => `
            <div class="gallery-item" data-src="${safePath(src)}" data-title="${esc(t.title)}">
              <div class="gallery-img-wrap">
                <img src="${safePath(src)}" alt="${esc(t.title)}"
                     onerror="this.parentElement.innerHTML='<span class=\\'gallery-img-placeholder\\'>📷</span>'">
              </div>
              <div class="gallery-item-info">
                <div class="gallery-item-title">${esc(t.title)}</div>
                <div class="gallery-item-meta">${esc(t.project)} · ${fmtDur(t.duration)}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`).join('')}`;

  // Event delegation — no inline onclick with interpolated paths
  el.onclick = function(e) {
    const card = e.target.closest('.gallery-item');
    if (!card) return;
    if (card.dataset.src) openLightbox(card.dataset.src, card.dataset.title || '');
  };
}

// ── Failure-point normalization ────────────────────────────────────────────
// Shared key used both for recurring-failure grouping and same-point detection.
// Strips numbers, quoted strings and trims to 80 chars so the same logical
// error groups together even when line numbers or values differ between runs.
function normalizeErrorKey(error) {
  if (!error) return null;
  return error.split('\n')[0]
    .replace(/\d+/g, 'N')
    .replace(/'.+?'/g, "'…'")
    .replace(/".+?"/g, '"…"')
    .trim()
    .substring(0, 80);
}

function buildRecurringFailures() {
  const counts = new Map();
  runs.forEach(run => {
    (run.allTests ?? []).filter(t => t.status === 'failed' || t.status === 'flaky').forEach(t => {
      if (!t.error) return;
      const key = normalizeErrorKey(t.error);
      counts.set(key, (counts.get(key) ?? 0) + 1);
    });
  });
  return [...counts.entries()].sort((a,b) => b[1]-a[1]).slice(0, 8).map(([label, cnt]) => ({ label, cnt }));
}

// ── Quarantine page ────────────────────────────────────────────────────────
function renderQuarantinePage() {
  const container = document.getElementById('quarantinePage');
  if (!container) return;

  // Collect all unique quarantined tests across all runs
  const testMap = new Map(); // key → { title, project, file, tags, runsData: [{ts, runId, status}], firstSeen }

  // Iterate runs oldest-first to find firstSeen
  const runsOldestFirst = runs.slice().reverse();
  runsOldestFirst.forEach(run => {
    (run.allTests ?? []).filter(t => t.quarantined).forEach(t => {
      const key = `${t.project}::${t.title}`;
      if (!testMap.has(key)) {
        testMap.set(key, {
          title: t.title,
          project: t.project,
          file: t.file,
          tags: (t.tags ?? []).filter(g => g.toLowerCase() !== '@quarantine' && g.toLowerCase() !== 'quarantine'),
          runsData: [],
          firstSeen: run.timestamp,
        });
      }
      testMap.get(key).runsData.push({ ts: run.timestamp, runId: run.runId, status: t.status });
    });
  });

  if (testMap.size === 0) {
    container.innerHTML = `
      <div class="page-header"><h2 class="page-title">${t('quarantine_title')}</h2></div>
      <div class="state-screen" style="padding:80px 0">
        <div class="state-screen-icon" style="font-size:36px">🛡️</div>
        <h3>${t('quarantine_empty_h')}</h3>
        <p style="color:var(--muted)">${t('quarantine_empty_p')}</p>
      </div>`;
    return;
  }

  const quarantinedTests = [...testMap.values()];

  container.innerHTML = `
    <div class="page-header">
      <div style="display:flex;align-items:baseline;gap:10px">
        <h2 class="page-title">${t('quarantine_title')}</h2>
        <span style="font-family:var(--mono);font-size:12px;color:var(--muted)">${quarantinedTests.length === 1 ? t('quarantine_count_one') : t('quarantine_count_many', {n: quarantinedTests.length})}</span>
      </div>
      <p style="color:var(--muted);font-size:13px;margin-top:4px">${t('quarantine_desc')}</p>
    </div>
    <div class="section">
      <table style="width:100%;border-collapse:collapse">
        <thead>
          <tr style="border-bottom:1px solid var(--border);font-family:var(--mono);font-size:11px;color:var(--muted);text-align:left">
            <th style="padding:8px 12px">${t('quarantine_th_test')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_file')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_last10')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_fail')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_flaky')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_pass')}</th>
            <th style="padding:8px 12px">${t('quarantine_th_since')}</th>
          </tr>
        </thead>
        <tbody>
          ${quarantinedTests.map(t => {
            const last10 = t.runsData.slice(-10);
            const sparkHtml = last10.map(r => `<span class="spark-dot ${statusClass(r.status)}"></span>`).join('');
            const failCount  = t.runsData.filter(r => r.status === 'failed').length;
            const flakyCount = t.runsData.filter(r => r.status === 'flaky').length;
            const passCount  = t.runsData.filter(r => r.status === 'passed').length;
            const tagsHtml   = t.tags.length ? t.tags.map(g => `<span class="tag" style="font-size:10px">${esc(g)}</span>`).join('') : '';
            const since      = new Date(t.firstSeen).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            return `
              <tr style="border-bottom:1px solid var(--border);vertical-align:middle">
                <td style="padding:10px 12px">
                  <div style="font-size:13px;font-weight:500">${esc(t.title)}</div>
                  <div style="display:flex;align-items:center;gap:6px;margin-top:4px">
                    <span class="badge" style="background:var(--surface2);color:var(--muted);font-size:10px">${esc(t.project)}</span>
                    <span class="badge quarantine" style="font-size:10px">${t('quarantine_badge')}</span>
                    ${tagsHtml}
                  </div>
                </td>
                <td style="padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--muted);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.file)}</td>
                <td style="padding:10px 12px">
                  <div class="sparkline" title="${t('quarantine_sparkline_title')}" style="gap:3px">${sparkHtml}</div>
                </td>
                <td style="padding:10px 12px;font-family:var(--mono);font-size:13px;color:${failCount > 0 ? 'var(--fail)' : 'var(--muted)'}">${failCount}</td>
                <td style="padding:10px 12px;font-family:var(--mono);font-size:13px;color:${flakyCount > 0 ? 'var(--flaky)' : 'var(--muted)'}">${flakyCount}</td>
                <td style="padding:10px 12px;font-family:var(--mono);font-size:13px;color:${passCount > 0 ? 'var(--pass)' : 'var(--muted)'}">${passCount}</td>
                <td style="padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--muted)">${since}</td>
              </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
}

window.navTo = function(view, el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  currentPage = view;

  const mc = document.getElementById('mainContent');

  if (view === 'dashboard') {
    render();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'trends') {
    mc.innerHTML = '<div id="trendsPage"></div>';
    renderTrendsPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'gallery') {
    mc.innerHTML = '<div id="galleryPage"></div>';
    renderGalleryPage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else if (view === 'search') {
    render();
    setTimeout(() => {
      const testBtn = document.querySelectorAll('.tab-btn')[1];
      if (testBtn) switchTab('test', testBtn);
      document.getElementById('testSearch')?.focus();
    }, 50);
  } else if (view === 'quarantine') {
    mc.innerHTML = '<div id="quarantinePage"></div>';
    renderQuarantinePage();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
};

window.jumpToRun = function(idx) {
  // Highlight sidebar item
  document.querySelectorAll('.sidebar-run').forEach((r, i) => r.classList.toggle('active', i === idx));
  // Open that run card in the list
  const card = document.getElementById(`run-${idx}`);
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  // Auto-open if not already open
  const detail = document.getElementById(`detail-${idx}`);
  if (detail && !detail.classList.contains('open')) toggleRun(idx);
};

// ── Latest run filter ──────────────────────────────────────────────────────
window.filterLatestRun = function(status) {
  activeFilter = status;
  const latest = runs[0];
  const latestRate = latest.totalTests > 0 ? (latest.passed / latest.totalTests * 100).toFixed(1) : '0.0';
  const totalRuns = runs.length;
  const avgPass = runs.reduce((s, r) => s + (r.totalTests > 0 ? r.passed / r.totalTests * 100 : 0), 0) / runs.length;
  renderMainContent(latest, totalRuns, avgPass, latestRate);
};

window.clearFilter = function() {
  activeFilter = null;
  const latest = runs[0];
  const latestRate = latest.totalTests > 0 ? (latest.passed / latest.totalTests * 100).toFixed(1) : '0.0';
  const totalRuns = runs.length;
  const avgPass = runs.reduce((s, r) => s + (r.totalTests > 0 ? r.passed / r.totalTests * 100 : 0), 0) / runs.length;
  renderMainContent(latest, totalRuns, avgPass, latestRate);
};

// ── i18n ───────────────────────────────────────────────────────────────────
function updateStaticElements() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
}

function rerenderCurrentPage() {
  const mc = document.getElementById('mainContent');
  if (!mc) return;
  if (currentPage === 'dashboard' || currentPage === 'search') {
    render();
  } else if (currentPage === 'trends') {
    mc.innerHTML = '<div id="trendsPage"></div>';
    renderTrendsPage();
  } else if (currentPage === 'gallery') {
    mc.innerHTML = '<div id="galleryPage"></div>';
    renderGalleryPage();
  } else if (currentPage === 'quarantine') {
    mc.innerHTML = '<div id="quarantinePage"></div>';
    renderQuarantinePage();
  }
  updateStaticElements();
}

function applyLocale(locale) {
  currentLocale = locale;
  localStorage.setItem('pw-reporter-locale', locale);
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === locale);
  });
  updateStaticElements();
  if (runs.length) rerenderCurrentPage();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLocale(btn.dataset.lang));
});
applyLocale(detectLocale());

// ── Bootstrap ──────────────────────────────────────────────────────────────
async function init() {
  // Apply config values that need JS to set
  document.title = CONFIG.pageTitle;
  const bn = document.getElementById('brandName');
  if (bn && CONFIG.brandName) bn.textContent = CONFIG.brandName;
  const pn = document.getElementById('projectName');
  if (pn && CONFIG.projectName) pn.textContent = CONFIG.projectName;
  const fp = document.getElementById('footerProject');
  if (fp && CONFIG.projectName) fp.textContent = CONFIG.projectName;

  try {
    const res = await fetch(`${CONFIG.historyIndexPath}?ts=${Date.now()}`, {
      cache: 'no-store'
    });
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();
    if (!data.runs?.length) { renderEmpty(); return; }
    runs = data.runs;
    render();
    requestAnimationFrame(() => { if (!localStorage.getItem('pw-reporter-tour-done')) startTour(); });
  } catch {
    // No history-index.json found — show embedded demo data so the dashboard is
    // immediately explorable. Once the user runs their own tests and generates
    // history-index.json, this branch is never reached and only real data is shown.
    runs = DEMO_RUNS;
    render();
    const meta = document.getElementById('topbarMeta');
    if (meta) meta.innerHTML += ' &nbsp;<span style="font-family:var(--mono);font-size:10px;font-weight:600;background:rgba(124,159,255,.15);color:var(--accent2);padding:1px 6px;border-radius:4px;letter-spacing:.05em">DEMO</span>';
    requestAnimationFrame(() => { if (!localStorage.getItem('pw-reporter-tour-done')) startTour(); });
  }
}

// ── Go ─────────────────────────────────────────────────────────────────────
init();

</script>
