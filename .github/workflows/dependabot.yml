version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/" # This looks for the package.json at the root of your repo
    schedule:
      interval: "weekly"
    # This groups all Playwright updates into ONE PR to avoid 5 different emails
    groups:
      playwright-dependencies:
        patterns:
          - "playwright"
          - "@playwright/*"
    labels:
      - "dependencies"
    # This ensures Dependabot updates the root AND all your packages/* workspaces
    versioning-strategy: increase